<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wanted Job Matcher</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <span class="brand">wanted<span class="brand-accent">match</span></span>
    <span class="topbar-sub">내 이력서로 채용 공고 자동 채점</span>
  </header>

  <main class="container">
    <section class="panel">
      <label class="field-label" for="resume">이력서</label>
      <textarea id="resume" class="resume-input" rows="8"
        placeholder="이력서 전문을 붙여넣으세요."></textarea>

      <label class="field-label" for="queryText">어떤 일을 찾으세요?</label>
      <input id="queryText" class="query-input" type="text"
        placeholder="예: 자바 잘하는 신입 백엔드 / 데이터 엔지니어 원해" />
      <div id="tagChips" class="tag-chips"></div>

      <div class="run-row">
        <label class="field-label inline" for="limit">공고 수</label>
        <input id="limit" class="limit-input" type="number" min="1" max="100" value="15" />
        <span id="limitHint" class="limit-hint"></span>
        <button id="runBtn" class="run-btn">분석 시작</button>
        <button id="cancelBtn" class="cancel-btn" type="button" hidden>중단</button>
      </div>

      <div id="statusBar" class="status-bar" hidden>
        <span id="statusText" class="status-text"></span>
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
      </div>
      <div id="errorBar" class="error-bar" hidden></div>
    </section>

    <div id="resultsBar" class="results-bar" hidden>
      <button id="resetSeenBtn" class="reset-btn" type="button">확인함 초기화</button>
    </div>
    <div id="emptyState" class="empty-state">이력서를 넣고 직군·검색어를 고른 뒤 분석을 시작하세요.</div>
    <section id="results" class="results"></section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
